name: Aviator Bot

on:
  schedule:
    - cron: "*/10 * * * *"  # Run every 10 minutes (adjust as needed)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node scraper.js
